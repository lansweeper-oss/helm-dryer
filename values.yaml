flink-kubernetes-operator:
  operatorServiceAccount:
    create: true
    name: "flink-operator"

  jobServiceAccount:
    create: true # TODO: figure out what these need - should not be the same as operator.
    name: "flink-operator-jobs"

  watchNamespaces:
    - flink-operator # TODO: move (back) to "flink" when ready

  # Replicas must be 1 unless operator leader election is configured
  replicas: 1

  rbac:
    create: true
    # kubernetes.rest-service.exposed.type: NodePort requires
    # list permission for nodes at the cluster scope.
    # Set create to true if you are using NodePort type.
    nodesRule:
      create: false
    operatorRole:
      create: true
      name: "flink-operator"
    operatorRoleBinding:
      create: true
      name: "flink-operator-role-binding"
    jobRole:
      create: true
      name: "flink"
    jobRoleBinding:
      create: true
      name: "flink-role-binding"

  operatorVolumeMounts:
    create: true
    data:
      - name: flink-artifacts
        mountPath: /opt/flink/artifacts
      - name: flink-tmp
        mountPath: /tmp

  operatorVolumes:
    create: true
    data:
      - name: flink-artifacts
        emptyDir: {}
        # hostPath:
        #   path: /tmp/flink/artifacts
        #   type: DirectoryOrCreate
      - name: flink-tmp
        emptyDir: {}
  #    - name: flink-artifacts
  #      persistentVolumeClaim:
  #        claimName: flink-artifacts

    flink-conf.yaml: |+
      # Flink Config Overrides
      kubernetes.operator.metrics.reporter.prom.factory.class: org.apache.flink.metrics.prometheus.PrometheusReporterFactory
      kubernetes.operator.metrics.reporter.prom.port: 9999    

      kubernetes.operator.reconcile.interval: 15 s
      kubernetes.operator.observer.progress-check.interval: 5 s
      taskmanager.numberOfTaskSlots: 10
    log4j-operator.properties: |+
      # Flink Operator Logging Overrides
      # rootLogger.level = DEBUG
      # logger.operator.name= org.apache.flink.kubernetes.operator
      # logger.operator.level = DEBUG
    log4j-console.properties: |+
      # Flink Deployment Logging Overrides
      # rootLogger.level = DEBUG
    config.yaml: |+
      pipeline:
        serialization-config: [com.lansweeper.dp.outbound.v1.Asset: {type: kryo, kryo-type: registered, class: com.twitter.chill.protobuf.ProtobufSerializer}, com.lansweeper.syncer.edge.asset.Asset: {type: kryo, kryo-type: registered, class: com.twitter.chill.protobuf.ProtobufSerializer}, com.lansweeper.syncer.edge.asset.EntityRequest: {type: kryo, kryo-type: registered, class: com.twitter.chill.protobuf.ProtobufSerializer}]

  # Set the jvm start up options for webhook and operator
  jvmArgs:
    webhook: ""
    operator: ""
    logConfig: "-Dlog4j.configurationFile=/opt/flink/conf/log4j-operator.properties"

  # Configure health probes for the operator
  operatorHealth:
    port: 8085
    livenessProbe:
      periodSeconds: 10
      initialDelaySeconds: 30
    startupProbe:
      failureThreshold: 30
      periodSeconds: 10
