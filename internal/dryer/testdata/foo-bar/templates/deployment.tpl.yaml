apiVersion: apps/v1
kind: Deployment
metadata:
{{- with .Values.annotations }}
  annotations: {{- toYaml . | nindent 4 }}
{{- end }}
  name: {{ include "foo-bar.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "foo-bar.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "foo-bar.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "foo-bar.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "foo-bar.serviceAccountName" . }}
      volumes:
        - name: tmp-var
          emptyDir: {}
      initContainers:
        - name: copy-var
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          command:
            - 'sh'
            - '-c'
            - 'cp -r /var /tmp/var'
          volumeMounts:
            - name: tmp-var
              mountPath: /tmp/var
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
            - name: metrics
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: http
          readinessProbe:
            httpGet:
              path: /ready
              port: http
          volumeMounts:
            - name: tmp-var
              mountPath: /tmp/var
