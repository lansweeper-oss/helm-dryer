{{- if .Values.serviceMonitor.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
{{- with .Values.annotations }}
  annotations: {{- toYaml . | nindent 4 }}
{{- end }}
  name: {{ include "foo-bar.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "foo-bar.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "foo-bar.selectorLabels" . | nindent 6 }}
  endpoints:
    - port: metrics
      interval: 30s
{{- end }}
