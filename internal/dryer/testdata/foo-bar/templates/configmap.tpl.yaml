apiVersion: v1
kind: ConfigMap
metadata:
{{- with .Values.annotations }}
  annotations: {{- toYaml . | nindent 4 }}
{{- end }}
  name: {{ include "foo-bar.fullname" . }}
  labels:
    {{- include "foo-bar.labels" . | nindent 4 }}
data:
  clusterName: {{ .Values.clusterName }}
  config.yaml: |
    {{- toYaml .Values.config | nindent 4 }}
