---
apiVersion: v1
kind: Service
metadata:
{{- with .Values.annotations }}
  annotations: {{- toYaml . | nindent 4 }}
{{- end }}
  name: {{ include "foo-bar.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "foo-bar.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ dig "port" 80 .Values.service }}
      targetPort: http
      protocol: TCP
      name: {{ dig "name" "http" .Values.service }}
    - port: {{ dig "metrics" 8080 .Values.service }}
      targetPort: metrics
      protocol: TCP
      name: {{ dig "name" "http" .Values.service }}
  selector:
    {{- include "foo-bar.selectorLabels" . | nindent 4 }}
