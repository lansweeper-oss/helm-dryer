apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
{{- with .Values.annotations }}
  annotations: {{- toYaml . | nindent 4 }}
{{- end }}
  name: {{ include "foo-bar.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "foo-bar.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "foo-bar.fullname" . }}
  minReplicas: 1
  maxReplicas: {{ .Values.replicaCount }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 80
