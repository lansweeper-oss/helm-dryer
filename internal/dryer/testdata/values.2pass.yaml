foo-bar:
  clusterName: ~
  controllerConfig:
    featureGates:
      SubnetsClusterTagCheck: false
  enableCertManager: true
  logLevel: info
  metricsBindAddress: 127.0.0.1:8080
  nodeSelector:
    worker-group: &group system
  tolerations:
    - effect: NoSchedule
      key: dedicated
      operator: Equal
      value: *group
  serviceMonitor:
    enabled: true
tags:
  foobar: false
  hello: false
