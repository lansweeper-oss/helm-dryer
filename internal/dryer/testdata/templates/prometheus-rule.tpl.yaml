{{- if .Capabilities.APIVersions.Has "monitoring.coreos.com/v1/PrometheusRule" }}
{{- $fullName := printf "%s-%s" .Values.domain .Release.Name | lower }}
{{- $serviceName := dig "monitoring" "service" "name" "" .Values.AsMap | default "" }}
{{- $validName := regexMatch "^[a-z0-9-]{1,63}$" $serviceName }}
{{- $name := ternary $serviceName $fullName $validName }}
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  annotations:
    helm.sh/resource-policy: keep
    helm.sh/hook: "pre-install"
    helm.sh/hook-delete-policy: "before-hook-creation"
  labels:
    app.kubernetes.io/instance: {{ .Release.Name }}
    dependencyTest: "2"
    secondPassTest: "true"
  name: {{ .Release.Name }}-prometheus-rules
spec:
  groups:
  - name: foo-bar
    rules:
    - alert: foo-bar-pods-on-error
      annotations:
        message: >-
          Pod {{ "{{ $labels.pod }}" }} in namespace {{ "{{ $labels.namespace }}" }} has been in error state for long time
      expr: >-
        absent(up{job="foo-bar"})
      for: 30m
      labels:
        priority: P4
        service: {{ $name }}
{{- end }}
