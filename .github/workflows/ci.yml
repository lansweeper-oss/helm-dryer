---
name: CI
defaults:
  run:
    shell: bash
env:
  go_version: '1.26.0'
  golangci_version: 'v2.11.4'
on:
  pull_request: {}
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true
jobs:

  lookup:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 0
        ref: ${{ github.event.pull_request.head.sha }}
    - name: Get changed files
      id: lookup
      uses: tj-actions/changed-files@22103cc46bda19c2b464ffe86db46df6922fd323 # v47.0.5
      with:
        files_yaml: |
          go:
            - '**/*.go'
            - 'go.mod'
            - 'go.sum'
            - 'tests/**'
          docs:
            - '**/*.md'
    outputs:
      changes: ${{ steps.lookup.outputs.go_any_changed }}
      docs: ${{ steps.lookup.outputs.docs_any_changed }}

  lint:
    runs-on: ubuntu-latest
    needs: lookup
    if: >-
      ${{
        needs.lookup.outputs.changes == 'true' &&
        github.event.pull_request.merged != true &&
        github.event_name != 'workflow_dispatch'
      }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: ${{ env.go_version }}
      - name: Tidy Go modules
        run: go mod tidy
      - name: Fail if there were changes
        run: |-
          if [ -n "$(git status --porcelain go.mod go.sum)" ]; then
            echo "❌ go.mod or go.sum were modified. Please run 'go mod tidy' and commit the changes."
            exit 1
          fi
      - uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          version: ${{ env.golangci_version }}
          args: --timeout=3m

  lint-docs:
    needs: lookup
    runs-on: ubuntu-latest
    if: ${{ needs.lookup.outputs.docs == 'true' }}
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        ref: ${{ github.event.pull_request.head.sha }}
    - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
      with:
        go-version: ${{ env.go_version }}
    - run: go mod download
    - name: Generate README
      run: |
        ./generate-readme.sh
    - name: Lint Markdown
      uses: actionshub/markdownlint@6c82ff529253530dfbf75c37570876c52692835f  # v3.1.4
    - name: Commit if changes
      env:
        GH_TOKEN : ${{ secrets.GITHUB_TOKEN }}
      run: |
        if [ -n "$(git status --porcelain README.md)" ]; then
          gh api graphql \
          -F githubRepository=${{ github.repository }} \
          -F branchName=${{ github.head_ref }} \
          -F expectedHeadOid=$(git rev-parse HEAD) \
          -F commitMessage="chore: update README.md" \
          -F files[][path]="README.md" -F files[][contents]=$(base64 -w0 README.md) \
          -F 'query=@.github/api/createCommitOnBranch.gql'
        fi

  test:
    runs-on: ubuntu-latest
    needs: lookup
    if: >-
      ${{
        needs.lookup.outputs.changes == 'true' &&
        github.event.pull_request.merged != true &&
        github.event_name != 'workflow_dispatch'
      }}
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        ref: ${{ github.event.pull_request.head.sha }}
    - name: Set up Go
      uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
      with:
        go-version: ${{ env.go_version }}
    - name: Test
      run: |
        go clean -testcache
        go test ./... -coverprofile=coverage.out -timeout 30s -v
    - name: Coverage badge
      run: |
        COVERAGE=$(go tool cover -func=coverage.out | awk '/total:/{print $3}')
        echo "Total coverage: $COVERAGE"
        COVERAGE_INT=${COVERAGE%.*}
        COLOR=orange
        if (( COVERAGE_INT <= 50 )) ; then
            COLOR=red
        elif (( COVERAGE_INT >= 80 )); then
            COLOR=green
        fi
        curl "https://img.shields.io/badge/coverage-$COVERAGE_INT%25-$COLOR" > coverage.svg
    - name: Commit if changes
      env:
        GH_TOKEN : ${{ secrets.GITHUB_TOKEN }}
      run: |
        if ! git diff --exit-code coverage.svg > /dev/null; then
          gh api graphql \
          -F githubRepository=${{ github.repository }} \
          -F branchName=${{ github.head_ref }} \
          -F expectedHeadOid=$(git rev-parse HEAD) \
          -F commitMessage="chore: update coverage banner" \
          -F files[][path]="coverage.svg" -F files[][contents]=$(base64 -w0 coverage.svg) \
          -F 'query=@.github/api/createCommitOnBranch.gql'
        fi
