---
name: CI
defaults:
  run:
    shell: bash
env:
  go_version: '1.26.0'
  golangci_version: 'v2.10.1'
on:
  pull_request: {}
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true
jobs:

  lookup:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 0
        ref: ${{ github.event.pull_request.head.sha }}
    - name: Get changed files
      id: lookup
      uses: tj-actions/changed-files@7dee1b0c1557f278e5c7dc244927139d78c0e22a # v47.0.4
      with:
        files_yaml: |
          go:
            - '**/*.go'
            - 'go.mod'
            - 'go.sum'
            - 'tests/**'
          docs:
            - '**/*.md'
    outputs:
      changes: ${{ steps.lookup.outputs.go_any_changed }}
      docs: ${{ steps.lookup.outputs.docs_any_changed }}

  lint:
    runs-on: ubuntu-latest
    needs: lookup
    if: >-
      ${{
        needs.lookup.outputs.changes == 'true' &&
        github.event.pull_request.merged != true &&
        github.event_name != 'workflow_dispatch'
      }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6.2.0
        with:
          go-version: ${{ env.go_version }}
      - name: Tidy Go modules
        run: go mod tidy
      - name: Fail if there were changes
        run: |-
          if [ -n "$(git status --porcelain go.mod go.sum)" ]; then
            echo "❌ go.mod or go.sum were modified. Please run 'go mod tidy' and commit the changes."
            exit 1
          fi
      - uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          version: ${{ env.golangci_version }}
          args: --timeout=3m

  lint-docs:
    needs: lookup
    runs-on: ubuntu-latest
    if: ${{ needs.lookup.outputs.docs == 'true' }}
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
    - uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6.2.0
      with:
        go-version: ${{ env.go_version }}
    - run: go mod download
    - name: Generate README
      run: |
        ./generate-readme.sh
    - name: Lint Markdown
      uses: actionshub/markdownlint@6c82ff529253530dfbf75c37570876c52692835f  # v3.1.4
    - name: Commit if changes
      run: |
        if [ -n "$(git status --porcelain README.md)" ]; then
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "chore: update README.md"
          for i in 1 2 3; do
            git pull origin "${{ github.head_ref }}" --rebase
            if git push origin HEAD:"${{ github.head_ref }}"; then
              break
            elif [ "$i" -eq 3 ]; then
              echo "❌ Failed to push after 3 attempts due to concurrent updates."
              exit 1
            else
              echo "Push failed, retrying ($i/3)..."
              sleep 2
            fi
          done
        fi

  test:
    runs-on: ubuntu-latest
    needs: lookup
    if: >-
      ${{
        needs.lookup.outputs.changes == 'true' &&
        github.event.pull_request.merged != true &&
        github.event_name != 'workflow_dispatch'
      }}
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
    - name: Set up Go
      uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6.2.0
      with:
        go-version: ${{ env.go_version }}
    - name: Test
      run: |
        go clean -testcache
        go test ./... -coverprofile=coverage.out -timeout 30s -v
    - name: Coverage badge
      run: |
        COVERAGE=$(go tool cover -func=coverage.out | awk '/total:/{print $3}')
        echo "Total coverage: $COVERAGE"
        COVERAGE_INT=${COVERAGE%.*}
        COLOR=orange
        if (( COVERAGE_INT <= 50 )) ; then
            COLOR=red
        elif (( COVERAGE_INT >= 80 )); then
            COLOR=green
        fi
        curl "https://img.shields.io/badge/coverage-$COVERAGE_INT%25-$COLOR" > coverage.svg
    - name: Commit if changes
      run: |
        if ! git diff --exit-code coverage.svg > /dev/null; then
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add coverage.svg
          git commit -m "chore: update coverage banner"
          for i in 1 2 3; do
            git pull origin "${{ github.head_ref }}" --rebase
            if git push origin HEAD:"${{ github.head_ref }}"; then
              break
            elif [ "$i" -eq 3 ]; then
              echo "❌ Failed to push after 3 attempts due to concurrent updates."
              exit 1
            else
              echo "Push failed, retrying ($i/3)..."
              sleep 2
            fi
          done
        fi
