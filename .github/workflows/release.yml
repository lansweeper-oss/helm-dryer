---
name: Release
defaults:
  run:
    shell: bash
env:
  go_version: '1.26.0'
on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      tag:
        description: Version to release
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false
jobs:
  lookup:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 0
    - name: Get changed files
      id: lookup
      uses: tj-actions/changed-files@22103cc46bda19c2b464ffe86db46df6922fd323 # v47.0.5
      with:
        files: |
          **/*.go
          go.mod
          go.sum
    outputs:
      release: ${{ steps.lookup.outputs.any_changed }}
  release:
    runs-on: ubuntu-latest
    needs: lookup
    if: ${{ needs.lookup.outputs.release == 'true' || github.event_name == 'workflow_dispatch' }}
    steps:
    -
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    -
      name: Set up Go
      uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6.2.0
      with:
        go-version: ${{ env.go_version }}
    -
      uses: ko-build/setup-ko@d006021bd0c28d1ce33a07e7943d48b079944c8d # v0.9
    -
      name: Get tag
      id: tag-from-input
      if: ${{ github.event_name == 'workflow_dispatch' }}
      run: echo "tag=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
    -
      name: Bump version and push tag
      id: tag-from-git
      if: ${{ github.event_name != 'workflow_dispatch' || steps.tag-from-input.outputs.tag == '' }}
      uses: mathieudutour/github-tag-action@a22cf08638b34d5badda920f9daf6e72c477b07b # v6.2
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        default_bump: false
        release_branches: ""
    -
      name: Get inferred tag
      id: tag
      run: >-
        tag=$(echo "${{
          steps.tag-from-input.outputs.tag != ''
          && steps.tag-from-input.outputs.tag
          || steps.tag-from-git.outputs.new_tag
        }}" | sed 's/^[^v]/v&/') &&
        echo "tag=${tag}" >> $GITHUB_OUTPUT
    -
      name: Build OCI image
      id: build-oci
      if: ${{ steps.tag.outputs.tag != '' }}
      run: >-
        ko build
        --base-import-paths
        --tags ${{ steps.tag.outputs.tag }},latest
        --image-label org.opencontainers.image.authors=Platform@lansweeper.com
        --image-label org.opencontainers.image.source=${{ github.repository }}
        --image-label org.opencontainers.image.url=${{ github.repository }}
        --image-label org.opencontainers.image.vendor=${{ github.repository_owner }}
    -
      name: Build binaries
      id: build-binaries
      if: ${{ steps.tag.outputs.tag != '' }}
      run: |-
        CMD="github.com/lansweeper-oss/helm-dryer/cmd/dryer"
        NOW=$(date +'%Y-%m-%dT%H:%M:%S')
        for os in linux darwin; do
          for arch in amd64 arm64; do
            echo "⛏️ Building for $os-$arch..."
            CGO_ENABLED=0 GOOS=$os GOARCH=$arch go build \
              -ldflags "-s -w -X $CMD.BuildTime=$NOW -X $CMD.BuildVersion=${{ steps.tag.outputs.tag }}" \
              -o /tmp/dryer .
            tar -zcf /tmp/dryer-$os-$arch.tar.gz -C /tmp dryer
          done
        done
    -
      name: Create a GitHub release
      if: ${{ steps.tag.outputs.tag != '' }}
      uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2
      with:
        tag_name: ${{ steps.tag.outputs.tag }}
        name: Release ${{ steps.tag.outputs.tag }}
        body: ${{ steps.tag-from-git.outputs.changelog }}
        files: |
          /tmp/dryer-linux-amd64.tar.gz
          /tmp/dryer-linux-arm64.tar.gz
          /tmp/dryer-darwin-amd64.tar.gz
          /tmp/dryer-darwin-arm64.tar.gz
